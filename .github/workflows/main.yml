name: Build KanaPy

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            launcher: KanaPy.sh
          - os: windows-latest
            launcher: KanaPy.bat
          - os: macos-latest
            launcher: KanaPy.command

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile main.py

      - name: Copy launcher (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: |
          cp ${{ matrix.launcher }} dist/
          chmod +x dist/${{ matrix.launcher }}

      - name: Copy launcher (Windows)
        if: matrix.os == 'windows-latest'
        run: copy ${{ matrix.launcher }} dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KanaPy-${{ matrix.os }}
          path: dist/
